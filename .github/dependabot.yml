version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        patterns:
          - "*"
      development:
        dependency-type: development
        patterns:
          - "*"
    # Prisma 7, React 19 and Framer Motion 12 migrations are done (2026-06-26);
    # @vercel/kv was replaced by @upstash/redis. No major versions held back for now —
    # re-add an `ignore` entry here if a future major needs a dedicated migration window.
